<!DOCTYPE html>
<html style="background-color: aquamarine;">
    <head>
        <title>FORM</title>
        <h1>Registeration Form</h1>
    </head>
<form style="background-color: aquamarine;">
    <fieldset>
        <legend>Personal Information</legend>
<label for="fname">firstname:</label>
<input type="text"id ="fname"name="fname"placeholder="Enter Firstname" value="john"><br><br>
<label for="lname">lastname:</label>
<input type="text"id ="lname"name="lname"placeholder="Enter Lastname" ><br><br>
<label for="address">Address : </label>
<input type="text"id="address"name="address"placeholder="Enter your Address"><br><br>
<label for="phone">Enter your phone number:</label>
<input type="text"size="2"name="country code"value="+93">
<input type="tel" id="phone" name="phone" placeholder="123-45-678" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" required>
<br><br>

Select your Gender : <br>
<input type="radio"id ="Male"name="Gender"value="Male" checked>
<label for="Male">Male</label><br>
<input type="radio"id ="Female"name="Gender"value="Female">
<label for="Female">Female</label><br>
<br><br>

Select your Educational Qualification : <br>
<select>
    <option value="Hsc passed">Hsc passed</option>
    <option value="Ssc passed">Ssc passed</option>
    <option value="Undergradute" selected>Undergradute</option>
    <option value="Postgradute">Postgradute</option>
</select>
<br><br>

  <label for="favcolor">Select your favorite color:</label>
  <input type="color" id="favcolor" name="favcolor">
<br><br>

  <label for="birthday">Birthday:</label>
  <input type="date" id="birthday" name="birthday">
  <br><br>

<label for="datemax">Enter a date before 1980-01-01:</label>
  <input type="date" id="datemax" name="datemax" min="1990-12-01"  max="2001-01-02"><br><br>
  <br><br>

 <label for="birthdaytime">Birthday (date and time):</label>
  <input type="datetime-local" id="birthdaytime" name="birthdaytime">
  <br><br>

    <label for="vol">Volume (between 0 and 50):</label>
  <input type="range" id="vol" name="vol" min="0" max="50">
  <br><br>

    <label for="gsearch">Search Google:</label>
  <input type="search" id="gsearch" name="gsearch">
  <br><br>

Select your Profession : <br>
<input type="checkbox"name="Employed"value="Employed" checked>
<label for="Employed">Employed</label><br>
<input type="checkbox"name="Student"value="Student">
<label for="Student">Student</label><br>
<input type="checkbox"name=""value="Unemployed">
<label for="Unemployed">Unemployed</label><br><br>

<label for="myfile"> Drop your Resume : </label>
<input type="file" id="myfile" name="myfile"><br><br>

<label for="email">Email : </label>
<input type="email" id="email" name="email" placeholder="Enter your Email" ><br><br>
<label for="psw">Password : </label>
<input type="password" name="psw" id="psw" placeholder="Enter your Password "><br><br>
<label for="psw.repeat">Re-type Password : </label>
<input type="password" name="psw.repeat" id="psw.repeat" placeholder="Re-type your Password "><br><br>

Additional Information : <br>
<textarea placeholder="Write additional inforamation about yourself if you want" rows="3" cols="20"></textarea><br><br>

<input type="submit">
</fieldset>
</form>
</html>
